# KV260 IMP Hardware Configuration v0.1

[project]
name = "imp"
version = "0.1.0"

[target]
fpga = "xczu4ev-sfvc784-1"
clock_hz = 100_000_000

[interface]
name = "axi4-lite"
address_width = 18
data_width = 32

[memory]
# CPU Interface Registers (flipflop - small registers)
"0x4000A000" = { size = 1, type = "flipflop", element_bits = 8 }
"0x4000A004" = { size = 1, type = "flipflop", element_bits = 8 }
"0x4000A008" = { size = 1, type = "flipflop", element_bits = 4 }
"0x4000A00C" = { size = 1, type = "flipflop", element_bits = 16 }
"0x4000A040" = { size = 1, type = "flipflop", element_bits = 16 }
"0x4000A044" = { size = 1, type = "flipflop", element_bits = 18 }
"0x4000A048" = { size = 1, type = "flipflop", element_bits = 1 }
"0x4000A04C" = { size = 1, type = "flipflop", element_bits = 1 }
"0x40000050" = { size = 1, type = "flipflop", element_bits = 16 }

# BRAM/UltraRAM Buffers (262144 x 16-bit = 512KB each)
"0x40A0A000" = { size = 262144, type = "ultraram", element_bits = 16 }
"0x40A60000" = { size = 262144, type = "ultraram", element_bits = 16 }
"0x40A80000" = { size = 262144, type = "bram", element_bits = 16 }
"0x40AA0000" = { size = 262144, type = "bram", element_bits = 16 }
"0x40AC0000" = { size = 262144, type = "bram", element_bits = 16 }
"0x40AE0000" = { size = 262144, type = "bram", element_bits = 16 }
"0x40B00000" = { size = 262144, type = "bram", element_bits = 16 }
"0x40B20000" = { size = 262144, type = "bram", element_bits = 16 }
"0x40B40000" = { size = 262144, type = "bram", element_bits = 16 }
"0x40B60000" = { size = 262144, type = "bram", element_bits = 16 }

[io]
"0x4000A000" = { pin = "H5", direction = "output" }
"0x4000A004" = { pin = "J5", direction = "output" }
"0x4000A008" = { pin = "H6", direction = "output" }